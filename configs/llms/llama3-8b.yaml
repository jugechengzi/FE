name: meta-llama/Meta-Llama-3-8B-Instruct

##### for WISE ####
## alternative: WISE-Merge, WISE-Retrieve
# for merge (if merge)
densities: 0.53
weights: 1.0

# for retrieve (if retrieve, pls set to True)
retrieve: False
replay: False # True --> will replay the past editing instances: see https://arxiv.org/abs/2405.14768 Appendix B.3

model_parallel: False
use_chat_template: True
hidden_act: ''

mask_ratio: 0.2
edit_lr: 0.9
n_iter: 30
norm_constraint: 1.0
act_margin: [2.0, 20.0, 10.0] # alpha, beta, gamma
alpha: 2.0
beta: 20.0
gamma: 10.0
act_ratio: 0.5
save_freq: 500
merge_freq: 1000
merge_alg: 'ties'
objective_optimization: 'only_label'
inner_params:
- model.layers[29].mlp.down_proj.weight
##### for WISE end #####

fact_token: subject_last

##### for FT start #####
lr: 5e-4
weight_decay: 0
num_steps: 25
lambda_reg: 0.01
##### for FT end #####

#### for LTI start ####
mid_kl_factor: 0.0425
last_kl_factor: 0.0625
nll_factor: 1
midlayers:
  - 15
constr_pos: subject
#### for LTI end ####

clamp_norm_factor: 0.75
v_num_grad_steps: 25
v_lr: 0.1
v_loss_layer: 31
v_weight_decay: 0.5
kl_factor: 0.0625

layers:
  - 4
  - 5
  - 6
  - 7
  - 8
mom2_update_weight:
  - 15000
  - 15000
  - 15000
  - 15000
  - 15000
layer_selection: all

rewrite_module_tmp: model.layers.{}.mlp.down_proj
layer_module_tmp: model.layers.{}
mlp_module_tmp: model.layers.{}.mlp
attn_module_tmp: model.layers.{}.self_attn
ln_f_module: model.norm
lm_head_module: lm_head

mom2_dataset: wikipedia
mom2_n_samples: 100000
mom2_dtype: float32
mom2_adjustment: true
mom2_maxseqlen: