name: Qwen/Qwen2-7B

##### for WISE ####
## alternative: WISE-Merge, WISE-Retrieve
# for merge (if merge)
densities: 0.53
weights: 1.0

# for retrieve (if retrieve, pls set to True)
retrieve: False
replay: False # True --> will replay the past editing instances: see https://arxiv.org/abs/2405.14768 Appendix B.3

model_parallel: False
use_chat_template: True

mask_ratio: 0.2
edit_lr: 1.0
n_iter: 70
norm_constraint: 1.0
act_margin: [5.0, 20.0, 10.0] # alpha, beta, gamma
act_ratio: 0.88
save_freq: 500
merge_freq: 1000
merge_alg: 'ties'
objective_optimization: 'only_label'
inner_params:
- model.layers[23].mlp.down_proj.weight
##### for WISE end ####

#### for LTI start ####
mid_kl_factor: 0.0425
last_kl_factor: 0.0625
nll_factor: 1
midlayers:
  - 15
constr_pos: subject
#### for LTI end ####



fact_token: subject_last

clamp_norm_factor: 4
v_num_grad_steps: 25
v_lr: 5e-1
v_loss_layer: 27
v_weight_decay: 1e-3
kl_factor: 0.0625

layers:
  - 4
  - 5
  - 6
  - 7
  - 8
mom2_update_weight:
  - 1.5e6
  - 1.5e6
  - 1.5e6
  - 1.5e6
  - 1.5e6
layer_selection: all

rewrite_module_tmp: model.layers.{}.mlp.down_proj
layer_module_tmp: model.layers.{}
mlp_module_tmp: model.layers.{}.mlp
attn_module_tmp: model.layers.{}.self_attn
ln_f_module: model.norm
lm_head_module: lm_head

mom2_dataset: wikipedia
mom2_n_samples: 100000
mom2_dtype: float32
mom2_adjustment: true
mom2_maxseqlen: 8192