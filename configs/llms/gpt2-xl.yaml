name: gpt2-xl

### For WISE algorithm ###
hidden_act: ''
model_parallel: False

mask_ratio: 0.2
edit_lr: 1.0
n_iter: 40
norm_constraint: 1.0
act_margin: [5.0, 20.0, 10.0] # alpha, beta, gamma
alpha: 5.0
beta: 20.0
gamma: 10.0
act_ratio: 0.8
save_freq: 500
merge_freq: 1000
merge_alg: 'ties'
objective_optimization: 'only_label'
inner_params:
- transformer.h[8].mlp.c_fc.weight


## alternative: WISE-Merge, WISE-Retrieve

# for merge (if merge)
densities: 0.53
weights: 1.0

# for retrieve (if retrieve, pls set to True)
retrieve: False
replay: False # True --> will replay the past editing instances: see https://arxiv.org/abs/2405.14768 Appendix B.3
### For WISE end ###

#### for LTI start ####
mid_kl_factor: 0.0425
last_kl_factor: 0.0625
nll_factor: 1
midlayers:
  - 15
constr_pos: subject
#### for LTI end ####

fact_token: subject_last

clamp_norm_factor: 0.75
v_num_grad_steps: 35
v_lr: 5e-1
v_loss_layer: 47
v_weight_decay: 0.5
kl_factor: 0.0625

layers:
  - 13
  - 14
  - 15
  - 16
  - 17
mom2_update_weight:
  # - 20000
  # - 20000
  # - 20000
  # - 20000
  # - 20000
  - 15000
  - 15000
  - 15000
  - 15000
  - 15000
  # - 5000
  # - 5000
  # - 5000
  # - 5000
  # - 5000
layer_selection: all

rewrite_module_tmp: transformer.h.{}.mlp.c_proj
layer_module_tmp: transformer.h.{}
mlp_module_tmp: transformer.h.{}.mlp
attn_module_tmp: transformer.h.{}.attn
ln_f_module: transformer.ln_f
lm_head_module: lm_head

mom2_dataset: wikipedia
mom2_n_samples: 100000
mom2_dtype: float32
mom2_adjustment: true
mom2_maxseqlen: