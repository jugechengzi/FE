defaults:
  - algs: memit
  - llms: llama3-8b


gpu: 0
model_dtype: bfloat16 #choices=["auto","float32","bfloat16"]
bs: 2000
data: multi_counterfact_20877 #choices=[multi_counterfact_20877,zsre_mend_eval_19086,wiki_cf_2266,mquake_cf_9218, counterfact_2000]
neighborhood_logits: False
cache_filename_suffix: "" #a suffix added to cache filename, useful when you want to use different cache settings

cov_mode: "default" #choices=["default","random","identity"]
lti: False
num_edits: 2000
test_only: False
tf_props: False
inversion_tf: False
unlearning_ab: False
negetive_prompt_test: False
subject_output_relation_test1: False
subject_output_relation_test2: False
target_true_test: False
target_true_file_suffix: "_filtered" #"_filtered" or "_auto_corrected"
target_auto_corrected_test: False
topk: True
debug_mode: False #edit a small number of samples, for debug only,
#it will not save model, you can ignore it.
c_edit: False #continue to edit from previous edited model, you must ensure the previous checkpoint exists.

save_name: default #the prefix of the name of saved model, {dataset}-{save_name}-{model_name}.pt
#format of save_name: 2000-bs100
load_name: default #the prefix of the name of saved model to be loaded, {dataset}-{load_name}-{model_name}.pt
#format of save_name: 2000-bs100
